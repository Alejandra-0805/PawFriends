<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil Mascota</title>
  <link rel="stylesheet" href="../css/perfilPerro.css">
</head>
<body>

<header class="header">
  <img src="../imagenes/logo.svg">
  <h2>Perfil de la mascota</h2>
</header>

<div class="container">
  <div class="left">
    <img src="../imagenes/perro1.jpg" class="main-img">

    <div class="mini-imgs">
      <img src="../imagenes/perro2.jpg">
      <img src="../imagenes/perro3.jpg">
    </div>

    <p class="fav">Agregar a favoritos ♡</p>

    <button class="btn-adoptar">Adóptame</button>
  </div>

  <div class="right">

    <div class="info-box">
      <h3>Nombre: Max</h3>
      <span class="status">Disponible</span>

      <div class="datos">
        <p>♂ Macho</p>
        <p>🎂 2 años</p>
        <p>⚖️ 15kg</p>
        <p>⚡ Alta</p>
      </div>
    </div>

    <div class="desc">
      Max es un perrito muy juguetón que fue rescatado hace dos meses y busca un hogar
    </div>

    <div class="caracteristicas">
      <h4>Características:</h4>
      <div class="grid">
        <p>⚡ Energía: Alta</p>
        <p>🐾 Bueno con otros perros</p>
        <p>👶 Bueno con niños</p>
        <p>✔ Vacunado</p>
      </div>
    </div>

  </div>

</div>

<script src="../JavaScript/perfilPerro.js"></script>
</body>
</html>
