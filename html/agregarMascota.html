<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de mascotas</title>
  <link rel="stylesheet" href="../css/agregarMascota.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="../imagenes/logo.svg" class="logo">
    <h2>PawFriends</h2>
     <button class="btn-back" onclick="irHome()">←</button>
  </div>
</nav>

<div class="container">

  <h2 class="titulo">Gestión de mascotas</h2>

  <div class="grid">

    <div>

      <div class="card">
        <h3>Información básica</h3>

        <label>Nombre</label>
        <input type="text" id="nombre">

        <div class="row">
          <div>
            <label>Edad</label>
            <input 
              type="number" 
              id="edad" 
              placeholder="Ej: 2"
              min="1"
              step="1"
              oninput="validarNumero(this)"
            >
          </div>

          <div>
            <label>Tipo</label>
            <select id="tipoEdad">
              <option>Años</option>
              <option>Meses</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Sexo</label>
            <select id="sexo">
              <option>Selecciona</option>
              <option>Macho</option>
              <option>Hembra</option>
            </select>
          </div>

          <div>
            <label>Peso (kg)</label>
            <input 
              type="number" 
              id="peso" 
              placeholder="Ej: 10"
              min="1"
              step="0.1"
              oninput="validarNumero(this)"
            >
          </div>
        </div>

        <label>Tamaño</label>
        <select id="tamano">
          <option>Selecciona</option>
          <option>Pequeño</option>
          <option>Mediano</option>
          <option>Grande</option>
        </select>

      </div>

      <div class="card">
        <h3>Descripción</h3>
        <textarea id="descripcion"></textarea>
      </div>

    </div>

    <div>

      <div class="card">
        <h3>Información del perro</h3>

        <div class="row">
          <div>
            <label>Raza</label>
            <select id="raza">
              <option>Selecciona</option>
            </select>
          </div>

          <div>
            <label>Nivel de energía</label>
            <select id="energia">
              <option>Selecciona</option>
            </select>
          </div>
        </div>

        <label>Estado de salud</label>
        <select id="salud">
          <option>Selecciona</option>
        </select>
      </div>

      <div class="card fotos">
        <h3>Fotos del perro</h3>

        <div class="galeria" id="galeria"></div>

        <input type="file" id="inputFile" accept="image/*" multiple hidden>

        <button class="btn-subir" onclick="document.getElementById('inputFile').click()">
          + Agregar fotos
        </button>
      </div>

    </div>

  </div>

  <div class="footer">

    <div>
      <label>Estado de adopción</label>
      <select id="estado">
        <option>Disponible</option>
        <option>Adoptado</option>
      </select>
    </div>

    <div class="acciones">
      <button class="guardar" onclick="guardar()">GUARDAR</button>
        <button class="cancelar" onclick="cancelar()">CANCELAR</button>
    </div>

  </div>

</div>

<script src="../JavaScript/agregarMascota.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
