<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro PawFriends</title>
  <link rel="stylesheet" href="../css/registrarse.css">
</head>
<body>

<div class="container">

  <div class="form-card">
    <img src="../imagenes/logo.svg" class="logo">

    <p class="subtitle">Únete a PawFriends para adoptar un nuevo amigo</p>
    <h2>Crear cuenta</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <input type="password" id="confirm" placeholder="Confirmar contraseña">

    <button onclick="registrar()">Crear cuenta</button>
  </div>

  <div class="image-section">
    <img src="../imagenes/registro.jpg" alt="Familia con perro">
  </div>

</div>

<script src="../JavaScript/registrarse.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
