<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <link rel="stylesheet" href="../css/homeAdmin.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-left">
    <img src="../imagenes/logo.svg" class="logo">
    <h2>PawFriends</h2>
  </div>

  <h1 class="titulo">PANEL DE CONTROL DEL ADMINISTRADOR</h1>

  <div class="nav-right">
    <img src="../imagenes/usuario.png" class="user">
  </div>
</nav>

<div class="container">

  <div class="hero">
    <img src="https://images.unsplash.com/photo-1583511655826-05700d52f4d9">
  </div>

  <h2 class="subtitulo">Datos clave</h2>

  <div class="cards">

    <div class="card" onclick="irAdopciones()">
      <img src="../imagenes/perro.png">
      <h3 id="totalPerros">0</h3>
      <p>Perros disponibles</p>
    </div>

    <div class="card" onclick="irSolicitud()">
      <img src="../imagenes/formulario.png">
      <h3 id="totalSolicitudes">0</h3>
      <p>Solicitudes</p>
    </div>

    <div class="card" onclick="irAceptadas()">
      <div class="check">✔</div>
      <h3 id="totalAdoptados">0</h3>
      <p>Adoptados</p>
    </div>

  </div>

</div>

<script src="../JavaScript/homeAdmin.js"></script>
</body>
</html>
